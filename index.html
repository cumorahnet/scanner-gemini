<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ofertas Rápidas Yaute v33.1 - Integración Total</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* MANTENEMOS TUS ESTILOS ORIGINALES */
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --bg: #f8fafc; --card-radius: 20px; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); }
        body { display: flex; flex-direction: column; font-family: 'Inter', sans-serif; }
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }

        /* HEADER Y NAV ORIGINAL */
        header { background: var(--primary); color: white; padding: 1.2rem 1rem; position: sticky; top: 0; z-index: 1000; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; text-align: center; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 10px 0 25px; border-top: 1px solid #f1f5f9; z-index: 2000; }
        .tab-btn { background: none; border: none; color: #94a3b8; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: 700; }
        .tab-btn.active { color: var(--accent); }

        /* BUSCADORES AUTOMÁTICOS */
        .card-custom { background: white; border-radius: var(--card-radius); padding: 20px; margin-bottom: 15px; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08); position: relative; }
        .form-control { padding: 0.8rem 1rem; border-radius: 14px; border: 2px solid #f1f5f9; }
        .sug-box { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 14px; max-height: 220px; overflow-y: auto; z-index: 1500; border: 1px solid #e2e8f0; box-shadow: 0 15px 30px rgba(0,0,0,0.15); margin-top: 5px; }
        .sug-item { padding: 14px 18px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 0.95rem; text-transform: uppercase; font-weight: 700; }

        /* DISEÑO PARA BOTONES DE INICIO */
        #home-selector { display: flex; flex-direction: column; gap: 15px; padding: 10px; }
        .btn-mode { padding: 25px; border-radius: 20px; border: none; color: white; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 1.1rem; }
        
        /* ESTILOS SCANNER IA */
        #ia-modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        #cam-preview-ia { width: 100%; height: 100%; object-fit: cover; }
        .scan-frame { width: 75%; height: 40%; border: 3px solid #00e5c0; border-radius: 24px; box-shadow: 0 0 0 4000px rgba(0,0,0,0.6); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <h6 class="m-0 fw-bold">Ofertas Rápidas Yaute v33.1</h6>
        <div id="status-dot" class="status-dot bg-warning" style="width:10px; height:10px; border-radius:50%; display:inline-block;"></div>
    </header>

    <main>
        <div id="home-selector">
            <button class="btn-mode shadow" style="background: linear-gradient(135deg, #00e5c0, #00a884);" onclick="window.openScanner()">
                <i class="fas fa-camera fa-2x"></i> PUBLICAR OFERTA (IA)
            </button>
            <button class="btn-mode shadow" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);" onclick="window.showTab('operaciones')">
                <i class="fas fa-cash-register fa-2x"></i> REGISTRAR VENTAS
            </button>
        </div>

        <div id="tab-operaciones" class="tab-content" style="display:none;">
            <div class="card-custom">
                <div class="row g-2 mb-2">
                    <div class="col-6" style="position:relative"><label class="text-uppercase small fw-bold">Tienda</label><input type="text" id="in-tienda" class="form-control text-uppercase fw-bold"><div id="sug-tienda" class="sug-box d-none"></div></div>
                    <div class="col-6" style="position:relative"><label class="text-uppercase small fw-bold">Cliente</label><input type="text" id="in-cliente" class="form-control text-uppercase"><div id="sug-cliente" class="sug-box d-none"></div></div>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-3"><label class="text-uppercase small fw-bold">Cant.</label><input type="number" id="in-cantidad" class="form-control text-center fw-bold" value="1"></div>
                    <div class="col" style="position:relative"><label class="text-uppercase small fw-bold">Producto</label><input type="text" id="in-producto" class="form-control text-uppercase" placeholder="BUSCAR..."><div id="sug-producto" class="sug-box d-none"></div></div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6"><label class="text-uppercase small fw-bold">Costo Anaquel</label><input type="number" id="in-costo" class="form-control fw-bold border-danger"></div>
                    <div class="col-6"><label class="text-uppercase small fw-bold">Precio Venta</label><input type="number" id="in-precio" class="form-control fw-bold border-success"></div>
                </div>
                <button id="btn-save-record" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">GUARDAR VENTA</button>
                <button class="btn btn-light w-100 mt-2 rounded-pill" onclick="location.reload()">VOLVER AL INICIO</button>
            </div>
        </div>
    </main>

    <div id="ia-modal">
        <video id="cam-preview-ia" autoplay playsinline muted></video>
        <div class="scan-frame"></div>
        <button class="btn btn-dark" style="position:absolute; top:20px; left:20px; border-radius:50px;" onclick="window.closeScanner()">✕ SALIR</button>
        <button id="snap-btn" class="btn btn-light" style="position:absolute; bottom:40px; left:50%; transform:translateX(-50%); width:80px; height:80px; border-radius:50%;" onclick="window.captureIA()"><i class="fas fa-camera fa-2x"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // TUS CREDENCIALES ORIGINALES
        const firebaseConfig = { apiKey: "AIzaSyCR5V_yg6aLumW_D8oFPEblHZ5ox2gTs98", authDomain: "ofertas-rapidas-yautepec.firebaseapp.com", projectId: "ofertas-rapidas-yautepec", storageBucket: "ofertas-rapidas-yautepec.firebasestorage.app", messagingSenderId: "81339635207", appId: "1:81339635207:web:26d180f92224d9a036fca2" };
        const GEMINI_KEY = "AIzaSyDJicNgq309eja6V0IAZI8w0j6NBYMBmjU";
        const appId = 'yaute-v1-shared';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.state = { sales: [], clients: [], stores: [], products: [] };
        let currentStream = null;

        // BUSCADORES AUTOMÁTICOS (RECUPERADOS)
        const startSync = () => {
            ['sales', 'clients', 'stores', 'products'].forEach(name => {
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', name), (snap) => {
                    window.state[name] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    document.getElementById('status-dot').className = "status-dot bg-success";
                });
            });
            setupAuto('in-tienda', 'sug-tienda', 'stores');
            setupAuto('in-cliente', 'sug-cliente', 'clients');
            setupAuto('in-producto', 'sug-producto', 'products');
        };

        const setupAuto = (inpId, boxId, key) => {
            const inp = document.getElementById(inpId); const box = document.getElementById(boxId);
            if (!inp) return;
            inp.oninput = () => {
                const val = inp.value.toUpperCase(); if(!val) { box.classList.add('d-none'); return; }
                const filtered = (window.state[key] || []).map(x => (x.nombre || "").toUpperCase()).filter(s => s.includes(val)).slice(0, 5);
                box.innerHTML = filtered.map(s => `<div class="sug-item" data-val="${s}">${s}</div>`).join('');
                box.classList.toggle('d-none', filtered.length === 0);
            };
            box.onclick = (e) => {
                const it = e.target.closest('.sug-item'); if(!it) return;
                inp.value = it.dataset.val; box.classList.add('d-none');
                if(key === 'products') {
                    const prod = window.state.products.find(x => x.nombre.toUpperCase() === it.dataset.val);
                    if(prod) { document.getElementById('in-costo').value = prod.costo; document.getElementById('in-precio').value = prod.precio; }
                }
            };
        };

        // FUNCIONES SCANNER IA
        window.openScanner = async () => {
            document.getElementById('home-selector').style.display = 'none';
            document.getElementById('ia-modal').style.display = 'flex';
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('cam-preview-ia').srcObject = currentStream;
        };

        window.closeScanner = () => {
            if(currentStream) currentStream.getTracks().forEach(t => t.stop());
            document.getElementById('ia-modal').style.display = 'none';
            document.getElementById('home-selector').style.display = 'flex';
        };

        window.captureIA = async () => {
            const video = document.getElementById('cam-preview-ia');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const b64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            
            document.getElementById('snap-btn').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ inline_data: { mime_type: 'image/jpeg', data: b64 } }, { text: "Nombre y marca. Responde solo el nombre en MAYÚSCULAS." }] }] })
                });
                const d = await res.json();
                const nombre = d.candidates[0].content.parts[0].text.trim();

                // VERIFICAR DUPLICADOS
                const existe = window.state.products.find(p => p.nombre.toUpperCase() === nombre.toUpperCase());
                if(existe) alert("⚠️ ESTE PRODUCTO YA ESTÁ EN EL CATÁLOGO");

                const venta = prompt(`PRODUCTO: ${nombre}\nPRECIO VENTA:`, existe ? existe.precio : "");
                const anaquel = prompt(`PRECIO ANAQUEL (Solo para control):`, existe ? existe.costo : "");

                if(venta) {
                    // Compartir WhatsApp y Guardar
                    await shareWhatsApp(nombre, venta, canvas.toDataURL('image/jpeg'));
                    if(!existe) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), { nombre, costo: parseFloat(anaquel)||0, precio: parseFloat(venta) });
                    }
                    location.reload();
                }
            } catch(e) { alert("Error IA"); }
            document.getElementById('snap-btn').innerHTML = '<i class="fas fa-camera fa-2x"></i>';
        };

        async function shareWhatsApp(n, p, img) {
            const b = await (await fetch(img)).blob();
            const f = new File([b], 'oferta.jpg', { type: 'image/jpeg' });
            if(navigator.share) await navigator.share({ files: [f], text: `🛒 *OFERTA*\n📦 ${n}\n💰 $${p}` });
        }

        window.showTab = (id) => {
            document.getElementById('home-selector').style.display = 'none';
            document.getElementById('tab-' + id).style.display = 'block';
        };

        startSync();
    </script>
</body>
</html>
