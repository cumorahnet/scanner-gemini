<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ofertas Rápidas Yaute v33.0 - Scanner & Ventas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #0f172a; --accent: #00e5c0; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        
        /* PANEL DE INICIO */
        #home-menu { display: flex; flex-direction: column; gap: 20px; padding: 20px; height: 80vh; justify-content: center; }
        .btn-main { padding: 40px 20px; border-radius: 25px; border: none; color: white; font-weight: 900; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; gap: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .bg-scanner { background: linear-gradient(135deg, #00e5c0, #00a884); }
        .bg-ventas { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }

        /* SCANNER OVERLAY */
        #scanner-view { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
        #camera-preview { width: 100%; height: 100%; object-fit: cover; }
        .scan-frame { position: absolute; inset: 0; border: 2px solid var(--accent); margin: auto; width: 80%; height: 40%; border-radius: 20px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); }
        
        /* ESTILOS APP EXISTENTE */
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .card-custom { background: white; border-radius: 20px; padding: 20px; margin: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-f { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; margin-bottom: 10px; outline: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .tab-btn { background: none; border: none; color: #94a3b8; font-size: 0.8rem; font-weight: bold; }
        .tab-btn.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h6 class="m-0 fw-bold">Ofertas Rápidas Yaute v33.0</h6>
        <small id="status-text" style="color: var(--accent);">CONECTANDO...</small>
    </header>

    <div id="home-menu">
        <button class="btn-main bg-scanner" onclick="openScanner()">
            <i class="fas fa-camera-retro fa-2x"></i>
            SCANNER IA & WHATSAPP
        </button>
        <button class="btn-main bg-ventas" onclick="showTab('ventas')">
            <i class="fas fa-cash-register fa-2x"></i>
            REGISTRAR VENTAS
        </button>
    </div>

    <div id="scanner-view">
        <video id="camera-preview" autoplay playsinline muted></video>
        <div class="scan-frame"></div>
        <button class="btn btn-danger" style="position: absolute; top: 20px; left: 20px;" onclick="closeScanner()">SALIR</button>
        <button class="btn-main bg-scanner" style="position: absolute; bottom: 40px; align-self: center; width: 80px; height: 80px; border-radius: 50%;" onclick="captureAndAnalyze()">
            <i class="fas fa-bolt"></i>
        </button>
    </div>

    <div id="section-ventas" style="display: none;">
        <div class="card-custom">
            <label class="small fw-bold">PRODUCTO</label>
            <input type="text" id="v-producto" class="input-f" placeholder="Buscar en catálogo...">
            <div class="row g-2">
                <div class="col-6"><label class="small fw-bold">ANAQUEL $</label><input type="number" id="v-costo" class="input-f"></div>
                <div class="col-6"><label class="small fw-bold">VENTA $</label><input type="number" id="v-precio" class="input-f"></div>
            </div>
            <button class="btn btn-primary w-100 rounded-pill py-3 fw-bold" onclick="saveVenta()">GUARDAR VENTA</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE Y GEMINI
        const firebaseConfig = { apiKey: "AIzaSyCR5V_yg6aLumW_D8oFPEblHZ5ox2gTs98", authDomain: "ofertas-rapidas-yautepec.firebaseapp.com", projectId: "ofertas-rapidas-yautepec", storageBucket: "ofertas-rapidas-yautepec.firebasestorage.app", messagingSenderId: "81339635207", appId: "1:81339635207:web:26d180f92224d9a036fca2" };
        const GEMINI_KEY = "AIzaSyDJicNgq309eja6V0IAZI8w0j6NBYMBmjU";
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        let stream = null;

        // ABRIR SCANNER
        async function openScanner() {
            document.getElementById('home-menu').style.display = 'none';
            document.getElementById('scanner-view').style.display = 'flex';
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('camera-preview').srcObject = stream;
        }

        function closeScanner() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('scanner-view').style.display = 'none';
            document.getElementById('home-menu').style.display = 'flex';
        }

        // CAPTURA Y ANÁLISIS IA
        async function captureAndAnalyze() {
            const video = document.getElementById('camera-preview');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            // Llamada a Gemini
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: 'POST',
                body: JSON.stringify({ contents: [{ parts: [{ inline_data: { mime_type: 'image/jpeg', data: base64 } }, { text: "Nombre y marca. Solo texto MAYÚSCULAS." }] }] })
            });
            const data = await res.json();
            const nombre = data.candidates[0].content.parts[0].text.trim();

            // VERIFICAR DUPLICADOS
            const snap = await db.collection("artifacts/yaute-v1-shared/public/data/products").where("nombre", "==", nombre).get();
            if(!snap.empty) {
                alert("⚠️ PRODUCTO YA EXISTE EN EL CATÁLOGO: " + nombre);
            }

            // Aquí el usuario pone precio y envía (Lógica Scanner v8.1)
            const precioVenta = prompt("PRECIO DE VENTA PARA: " + nombre);
            if(precioVenta) {
                shareWhatsApp(nombre, precioVenta, canvas.toDataURL('image/jpeg'));
                db.collection("artifacts/yaute-v1-shared/public/data/products").add({ nombre, precio: parseFloat(precioVenta), creado: Date.now() });
            }
        }

        // WHATSAPP CON FOTO REAL
        async function shareWhatsApp(nombre, precio, dataUrl) {
            const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], 'oferta.jpg', { type: 'image/jpeg' });
            if(navigator.share) {
                await navigator.share({ files: [file], text: `🛒 *OFERTA*\n📦 ${nombre}\n💰 $${precio}` });
            }
        }

        // NAVEGACIÓN
        function showTab(tab) {
            document.getElementById('home-menu').style.display = 'none';
            document.getElementById('section-ventas').style.display = tab === 'ventas' ? 'block' : 'none';
        }

        function saveVenta() {
            // Tu lógica original de guardado en Firebase
            alert("Venta registrada con éxito");
            location.reload();
        }
    </script>
</body>
</html>
