<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Scanner — Módulo Base</title>
<style>
  /* ── Variables y reset básico ── */
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --border: #2a2a45;
    --accent: #00e5c0;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --warn: #ff6b6b;
    --success: #00c896;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:monospace; }

  /* ── Cámara fullscreen ── */
  #lens-view {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
  }
  #camera-feed {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .lens-top {
    position: relative; z-index: 2;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    padding: 48px 20px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .lens-title { font-size: 18px; font-weight: bold; color: #fff; }
  .btn-settings {
    background: rgba(255,255,255,0.15); border: none;
    border-radius: 50%; width: 40px; height: 40px;
    font-size: 18px; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .lens-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    padding: 20px 24px 48px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .lens-hint { font-size: 13px; color: rgba(255,255,255,0.6); }
  .lens-actions { display: flex; align-items: center; justify-content: center; gap: 32px; }
  .btn-gallery {
    background: rgba(255,255,255,0.15); border: none;
    border-radius: 16px; width: 56px; height: 56px;
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-capture {
    width: 76px; height: 76px; border-radius: 50%;
    border: 4px solid #fff; background: rgba(255,255,255,0.15);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .btn-capture::after {
    content: ''; width: 56px; height: 56px;
    border-radius: 50%; background: #fff; transition: all 0.15s;
  }
  .btn-capture:active::after { width: 48px; height: 48px; }
  .btn-spacer { width: 56px; }

  /* ── Overlay de análisis ── */
  #analyzing-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,15,0.92); z-index: 50;
    display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
  }
  #analyzing-overlay.show { display: flex; }
  .analyzing-thumb {
    width: 140px; height: 140px; border-radius: 16px;
    overflow: hidden; border: 2px solid var(--border); position: relative;
  }
  .analyzing-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .analyzing-pulse {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,229,192,0.2), rgba(124,92,252,0.2));
    animation: pulse 1s ease-in-out infinite alternate;
  }
  @keyframes pulse { from{opacity:0.3} to{opacity:0.8} }
  .spinner {
    width: 48px; height: 48px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .analyzing-text { font-size: 15px; font-weight: bold; color: var(--accent); }
  .analyzing-sub  { font-size: 12px; color: var(--muted); }

  /* ── Vista de resultado ── */
  #result-view {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 40; display: none; flex-direction: column; overflow-y: auto;
  }
  #result-view.show { display: flex; }
  .result-photo { width: 100%; height: 240px; object-fit: cover; flex-shrink: 0; }
  .result-body { padding: 20px; flex: 1; }
  .result-label {
    font-size: 11px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
  }
  .result-field-wrap { position: relative; margin-bottom: 20px; }
  .result-field {
    width: 100%; background: var(--surface);
    border: 1.5px solid var(--border); border-radius: 12px;
    padding: 14px 44px 14px 14px; color: var(--text);
    font-family: monospace; font-size: 14px; line-height: 1.6;
    outline: none; resize: none; min-height: 56px;
    transition: border-color 0.2s;
  }
  .result-field:focus { border-color: var(--accent); }
  .result-field.readonly { cursor: default; opacity: 0.85; }
  .edit-btn {
    position: absolute; right: 12px; top: 14px;
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: var(--muted); transition: color 0.2s;
  }
  .edit-btn:hover { color: var(--accent); }
  .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .btn {
    flex: 1; padding: 14px; border-radius: 12px; border: none;
    font-family: monospace; font-size: 13px; font-weight: bold;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg, #7c5cfc, #00e5c0); color: #000; }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Panel de configuración ── */
  #settings-panel {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 60; display: none; flex-direction: column;
    align-items: center; justify-content: flex-end;
  }
  #settings-panel.show { display: flex; }
  .settings-inner {
    background: var(--surface); border-radius: 24px 24px 0 0;
    padding: 24px 24px 48px; width: 100%; max-width: 520px;
  }
  .settings-title { font-size: 16px; font-weight: bold; margin-bottom: 16px; }
  .key-wrap { display: flex; gap: 8px; margin-bottom: 8px; }
  .key-wrap input {
    flex: 1; background: #1c1c2e; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 12px; color: var(--text);
    font-family: monospace; font-size: 12px; outline: none;
  }
  .key-wrap input:focus { border-color: var(--accent); }
  .btn-save {
    padding: 10px 14px; background: linear-gradient(135deg, #7c5cfc, #00e5c0);
    border: none; border-radius: 10px; color: #000;
    font-family: monospace; font-size: 12px; font-weight: bold; cursor: pointer;
  }
  .key-hint { font-size: 10px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
  .key-hint a { color: #4285f4; text-decoration: none; }
  .key-status {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: rgba(107,107,138,0.15); color: var(--muted);
    float: right;
  }
  .key-status.ok { background: rgba(0,229,192,0.1); color: var(--accent); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1c1c2e; border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 20px;
    font-size: 13px; color: var(--text);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--warn); color: var(--warn); }
  .toast.success { border-color: var(--success); color: var(--success); }

  #file-input { display: none; }
</style>
</head>
<body>

<!-- Cámara -->
<div id="lens-view">
  <video id="camera-feed" autoplay playsinline muted></video>
  <div class="lens-top">
    <div class="lens-title">📷 Scanner</div>
    <button class="btn-settings" onclick="openSettings()">⚙️</button>
  </div>
  <div class="lens-bottom">
    <div class="lens-hint">Apunta al producto y captura</div>
    <div class="lens-actions">
      <button class="btn-gallery" onclick="document.getElementById('file-input').click()">🖼️</button>
      <button class="btn-capture" onclick="captureAndAnalyze()"></button>
      <div class="btn-spacer"></div>
    </div>
  </div>
</div>

<!-- Analizando -->
<div id="analyzing-overlay">
  <div class="analyzing-thumb">
    <img id="analyzing-thumb-img" src="" alt="">
    <div class="analyzing-pulse"></div>
  </div>
  <div class="spinner"></div>
  <div class="analyzing-text" id="analyzing-text">Analizando...</div>
  <div class="analyzing-sub" id="analyzing-sub">Gemini está procesando la imagen</div>
</div>

<!-- Resultado -->
<div id="result-view">
  <img id="result-photo" class="result-photo" src="" alt="">
  <div class="result-body">

    <!-- ═══════════════════════════════════════════════
         ZONA DE RESULTADOS — agrega tus campos aquí
         ═══════════════════════════════════════════════ -->
    <div class="result-label">Texto leído</div>
    <div class="result-field-wrap">
      <textarea id="field-resultado" class="result-field readonly" readonly rows="3"></textarea>
      <button class="edit-btn" onclick="toggleEdit('field-resultado', this)">✏️</button>
    </div>
    <!-- ═══════════════════════════════════════════════
         FIN ZONA DE RESULTADOS
         ═══════════════════════════════════════════════ -->

    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeResult()">🔄 Nueva foto</button>
      <button class="btn btn-primary" onclick="onResultReady()">✓ Usar datos</button>
    </div>
  </div>
</div>

<!-- Configuración -->
<div id="settings-panel" onclick="closeSettings()">
  <div class="settings-inner" onclick="event.stopPropagation()">
    <div class="settings-title">
      ⚙️ Configuración
      <span class="key-status" id="key-status">Sin configurar</span>
    </div>
    <div class="key-wrap">
      <input type="password" id="api-key-input" placeholder="AIzaSy..." autocomplete="off">
      <button class="btn-save" onclick="saveApiKey()">Guardar</button>
    </div>
    <div class="key-hint">
      Key gratis en <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> → Get API Key
    </div>
    <button class="btn btn-outline" onclick="closeSettings()" style="width:100%">Cerrar</button>
  </div>
</div>

<input type="file" id="file-input" accept="image/*">
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
// CONFIGURACIÓN — ajusta según tu proyecto
// ════════════════════════════════════════════════════

const GEMINI_MODEL = 'gemini-2.5-flash-lite';

// Prompt: define qué quieres extraer de la imagen
// Modifícalo según las necesidades de tu proyecto
const SCAN_PROMPT = `Analiza esta imagen y extrae el texto más relevante que encuentres.
Responde SOLO en JSON puro sin markdown: {"resultado":"..."}`;

// Esta función se ejecuta cuando el usuario acepta los datos
// Aquí conectas el resultado con el resto de tu app
function onResultReady() {
  const resultado = document.getElementById('field-resultado').value;

  // ── TU LÓGICA AQUÍ ──
  // Ejemplo: console.log(resultado)
  // Ejemplo: guardarEnFirestore(resultado)
  // Ejemplo: rellenarFormulario(resultado)
  alert('Datos listos:\n\n' + resultado);
}

// ════════════════════════════════════════════════════
// NÚCLEO DEL MÓDULO — no necesitas modificar esto
// ════════════════════════════════════════════════════

let capturedImage = null;
let cameraStream = null;

window.addEventListener('load', () => {
  const saved = localStorage.getItem('scanner_gemini_key');
  if (saved) { document.getElementById('api-key-input').value = saved; updateKeyStatus(true); }
  startCamera();
});

async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }, audio: false
    });
    document.getElementById('camera-feed').srcObject = cameraStream;
  } catch(e) { showToast('No se pudo acceder a la cámara', 'error'); }
}

function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
}

async function captureAndAnalyze() {
  if (!getApiKey()) { showToast('Configura tu API Key ⚙️', 'error'); openSettings(); return; }
  const video = document.getElementById('camera-feed');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0);
  capturedImage = canvas.toDataURL('image/jpeg', 0.85);
  await analyzeImage();
}

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => { capturedImage = ev.target.result; await analyzeImage(); };
  reader.readAsDataURL(file);
  e.target.value = '';
});

async function analyzeImage() {
  document.getElementById('analyzing-thumb-img').src = capturedImage;
  document.getElementById('analyzing-overlay').classList.add('show');

  const msgs = [
    ['Analizando imagen...', 'Gemini está procesando'],
    ['Reconociendo texto...', 'Leyendo contenido'],
    ['Extrayendo datos...', 'Casi listo...'],
  ];
  let i = 0;
  const iv = setInterval(() => {
    i = (i+1) % msgs.length;
    document.getElementById('analyzing-text').textContent = msgs[i][0];
    document.getElementById('analyzing-sub').textContent = msgs[i][1];
  }, 1200);

  try {
    const compressed = await compressImage(capturedImage, 1024, 0.82);
    const base64 = compressed.split(',')[1];

    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${getApiKey()}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { inline_data: { mime_type: 'image/jpeg', data: base64 } },
            { text: SCAN_PROMPT }
          ]}],
          generationConfig: { temperature: 0.1, maxOutputTokens: 300 }
        })
      }
    );

    clearInterval(iv);

    if (!resp.ok) {
      const err = await resp.json();
      if (resp.status === 429) {
        document.getElementById('analyzing-text').textContent = 'Esperando...';
        document.getElementById('analyzing-sub').textContent = 'Reintentando en 4 seg';
        await sleep(4000);
        document.getElementById('analyzing-overlay').classList.remove('show');
        await analyzeImage();
        return;
      }
      throw new Error(JSON.stringify(err.error || err));
    }

    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    let parsed = { resultado: text };

    try {
      const clean = JSON.parse(text.replace(/```json|```/g,'').trim());
      parsed = clean;
    } catch(e) {}

    // Poblar campo resultado
    document.getElementById('field-resultado').value = parsed.resultado || text;
    document.getElementById('result-photo').src = capturedImage;

    document.getElementById('analyzing-overlay').classList.remove('show');
    document.getElementById('result-view').classList.add('show');

  } catch(e) {
    clearInterval(iv);
    document.getElementById('analyzing-overlay').classList.remove('show');
    showToast('Error: ' + (e.message?.substring(0, 60) || 'Intenta de nuevo'), 'error');
  }
}

function closeResult() {
  document.getElementById('result-view').classList.remove('show');
  capturedImage = null;
  if (!cameraStream) startCamera();
}

function toggleEdit(id, btn) {
  const f = document.getElementById(id);
  if (f.readOnly) { f.readOnly=false; f.classList.remove('readonly'); f.focus(); btn.textContent='✅'; }
  else { f.readOnly=true; f.classList.add('readonly'); btn.textContent='✏️'; showToast('Actualizado','success'); }
}

function openSettings() { document.getElementById('settings-panel').classList.add('show'); }
function closeSettings() { document.getElementById('settings-panel').classList.remove('show'); }

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('AIza') || val.length < 20) { showToast('Key inválida', 'error'); return; }
  localStorage.setItem('scanner_gemini_key', val);
  updateKeyStatus(true);
  closeSettings();
  showToast('✓ API Key guardada', 'success');
}

function updateKeyStatus(ok) {
  const s = document.getElementById('key-status');
  s.className = 'key-status ' + (ok ? 'ok' : '');
  s.textContent = ok ? '✓ Configurada' : 'Sin configurar';
}

function getApiKey() { return localStorage.getItem('scanner_gemini_key') || ''; }

function compressImage(dataUrl, maxWidth, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const d = ctx.getImageData(0, 0, w, h).data;
      const id = ctx.getImageData(0, 0, w, h);
      for (let i = 0; i < id.data.length; i += 4) {
        id.data[i]   = Math.min(255, Math.max(0, (id.data[i]   - 128) * 1.15 + 128));
        id.data[i+1] = Math.min(255, Math.max(0, (id.data[i+1] - 128) * 1.15 + 128));
        id.data[i+2] = Math.min(255, Math.max(0, (id.data[i+2] - 128) * 1.15 + 128));
      }
      ctx.putImageData(id, 0, 0);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
