<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Express v8.2 — Antonio Hernandez</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
  :root { --bg: #0a0a0f; --accent: #00e5c0; --text: #e8e8f0; }
  body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; overflow: hidden; }
  #camera-feed { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .ui-overlay { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; pointer-events: none; }
  .btn-capture { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #fff; background: rgba(255,255,255,0.2); pointer-events: auto; align-self: center; }
  #result-view { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; overflow-y: auto; }
  .input-f { width: 100%; background: #13131c; border: 1px solid #2a2a45; border-radius: 8px; padding: 12px; color: #fff; margin-bottom: 10px; font-family: monospace; font-size: 14px; }
  .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; font-family: monospace; }
  #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PANTALLA API KEY — reemplaza el prompt() bloqueado en móviles ── */
  #key-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 300;
    display: none;                      /* js la muestra si falta la key */
    flex-direction: column; align-items: center; justify-content: center;
    padding: 35px; gap: 14px;
  }
  #key-screen h2  { color: var(--accent); font-size: 1rem; letter-spacing: 2px; }
  #key-screen p   { color: #6b6b8a; font-size: 0.72rem; text-align: center; line-height: 1.6; }
  #key-screen a   { color: var(--accent); }
  #key-input      { width: 100%; background: #13131c; border: 1px solid #2a2a45; border-radius: 8px; padding: 14px; color: #fff; font-family: monospace; font-size: 13px; outline: none; }
  #btn-change-key {
    position: absolute; top: 48px; right: 18px; z-index: 20;
    background: transparent; border: 1px solid #ff4466; color: #ff4466;
    border-radius: 6px; padding: 4px 10px; font-size: 0.65rem;
    font-family: monospace; cursor: pointer; pointer-events: auto;
  }
</style>
</head>
<body>

<!-- ══ PANTALLA API KEY ════════════════════════════════════════════ -->
<div id="key-screen">
  <h2>⚙ API KEY GEMINI</h2>
  <p>
    Necesaria para analizar las etiquetas.<br>
    Se guarda solo en este dispositivo.<br><br>
    Obtén la tuya gratis en<br>
    <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a>
  </p>
  <input id="key-input" type="password" placeholder="AIzaSy...">
  <button class="btn" style="background:var(--accent); color:#000;" onclick="saveKey()">
    GUARDAR Y CONTINUAR
  </button>
</div>

<!-- ══ CÁMARA ═════════════════════════════════════════════════════ -->
<video id="camera-feed" autoplay playsinline muted></video>

<div class="ui-overlay">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div style="font-weight:bold; color:var(--accent); pointer-events:auto;">
      SCANNER EXPRESS PRO v8.2
    </div>
    <!-- Botón discreto para cambiar la key sin romper el flujo -->
    <button id="btn-change-key" onclick="changeKey()">⚙ KEY</button>
  </div>
  <button class="btn-capture" onclick="capture()"></button>
</div>

<!-- ══ RESULTADO ══════════════════════════════════════════════════ -->
<div id="result-view">
  <img id="result-photo" style="width:100%; height:250px; object-fit:cover;">
  <div style="padding: 20px;">
    <label style="font-size: 10px; color: #6b6b8a;">PRODUCTO IDENTIFICADO</label>
    <textarea id="field-desc" class="input-f" rows="2"></textarea>
    
    <div style="display: flex; gap: 10px;">
      <div style="flex: 1;">
        <label style="font-size: 10px; color: #6b6b8a;">PRECIO ANAQUEL (NUBE)</label>
        <input type="number" id="field-anaquel" class="input-f" placeholder="0.00">
      </div>
      <div style="flex: 1;">
        <label style="font-size: 10px; color: #6b6b8a;">PRECIO VENTA (CLIENTE)</label>
        <input type="number" id="field-venta" class="input-f" placeholder="0.00">
      </div>
    </div>
    
    <button class="btn" style="background:var(--accent); color:#000;" onclick="shareAndSave()">
      📲 ENVIAR Y GUARDAR NUBE
    </button>
    <button class="btn" style="background:transparent; border:1px solid #ff4466; color:#ff4466;" onclick="location.reload()">
      CANCELAR
    </button>
  </div>
</div>

<!-- ══ LOADER ═════════════════════════════════════════════════════ -->
<div id="loader">
  <div style="border:4px solid #2a2a45; border-top:4px solid var(--accent); border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite;"></div>
  <p style="margin-top:15px; font-size:12px;">PROCESANDO...</p>
</div>

<script>
/* ══════════════════════════════════════════════
   FIREBASE
══════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyB3kiLskvkV6cJ0byaCg_zqe-GIWM3jelI",
  authDomain: "ofertas-rapidas-con-scanner.firebaseapp.com",
  projectId: "ofertas-rapidas-con-scanner",
  storageBucket: "ofertas-rapidas-con-scanner.firebasestorage.app",
  messagingSenderId: "1093159890306",
  appId: "1:1093159890306:web:67211603ff99753207f39b"
};
firebase.initializeApp(firebaseConfig);
const db      = firebase.firestore();
const storage = firebase.storage();
let currentBlob = null;

/* ══════════════════════════════════════════════
   API KEY — pantalla propia (sin prompt)
══════════════════════════════════════════════ */
function getKey() { return localStorage.getItem('gemini_key'); }

function saveKey() {
  const k = document.getElementById('key-input').value.trim();
  if (!k || k.length < 10) { alert("La key parece inválida, verifica."); return; }
  localStorage.setItem('gemini_key', k);
  document.getElementById('key-screen').style.display = 'none';
  start(); // arrancar cámara recién guardada la key
}

function changeKey() {
  // Muestra la pantalla de key sin borrar la actual (la deja en el input)
  const existing = getKey() || '';
  document.getElementById('key-input').value = existing;
  document.getElementById('key-screen').style.display = 'flex';
}

/* ══════════════════════════════════════════════
   ARRANQUE
══════════════════════════════════════════════ */
if (!getKey() || getKey().length < 10) {
  // Falta la key → mostrar pantalla de configuración
  document.getElementById('key-screen').style.display = 'flex';
} else {
  start();
}

async function start() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 } }
    });
    document.getElementById('camera-feed').srcObject = s;
  } catch(e) { alert("Error al iniciar cámara: " + e.message); }
}

/* ══════════════════════════════════════════════
   CAPTURA
══════════════════════════════════════════════ */
function capture() {
  const v = document.getElementById('camera-feed');
  if (!v.srcObject || v.videoWidth === 0) { alert("Cámara no lista, espera un momento."); return; }
  const canvas = document.createElement('canvas');
  canvas.width = v.videoWidth; canvas.height = v.videoHeight;
  canvas.getContext('2d').drawImage(v, 0, 0);
  canvas.toBlob(blob => {
    currentBlob = blob;
    document.getElementById('result-photo').src = URL.createObjectURL(blob);
    analyze(blob);
  }, 'image/jpeg', 0.88);
}

/* ══════════════════════════════════════════════
   IA — GEMINI
══════════════════════════════════════════════ */
async function analyze(blob) {
  document.getElementById('loader').style.display = 'flex';
  const reader = new FileReader();
  reader.onloadend = async () => {
    const base64 = reader.result.split(',')[1];
    const key    = getKey();

    // Si por alguna razón no hay key, mostrar pantalla (no prompt)
    if (!key) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('key-screen').style.display = 'flex';
      return;
    }

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [
              { inline_data: { mime_type: 'image/jpeg', data: base64 } },
              { text: "Marca y producto de esta etiqueta. Responde SOLO el nombre en MAYÚSCULAS, sin explicaciones." }
            ]}],
            generationConfig: { temperature: 0.1, maxOutputTokens: 100 }
          })
        }
      );
      const d = await res.json();
      if (!res.ok) throw new Error(d.error?.message || `HTTP ${res.status}`);
      document.getElementById('field-desc').value = d.candidates[0].content.parts[0].text.trim();
    } catch(e) {
      alert("Error IA: " + e.message);
    }

    document.getElementById('loader').style.display   = 'none';
    document.getElementById('result-view').style.display = 'flex';
  };
  reader.readAsDataURL(blob);
}

/* ══════════════════════════════════════════════
   ENVÍO + GUARDADO SIMULTÁNEO (sin cambios)
══════════════════════════════════════════════ */
async function shareAndSave() {
  const nombre  = document.getElementById('field-desc').value;
  const anaquel = document.getElementById('field-anaquel').value || "0";
  const venta   = document.getElementById('field-venta').value   || "0";

  const textoWhatsApp = `🛒 *OFERTA RÁPIDA*\n📦 PRODUCTO: ${nombre}\n💰 PRECIO: $${venta}`;

  // Firebase en segundo plano — no bloquea el share
  uploadData(nombre, anaquel, venta);

  // Web Share API con imagen adjunta
  if (navigator.canShare) {
    const file = new File([currentBlob], 'oferta_yautepec.jpg', { type: 'image/jpeg' });
    if (navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], text: textoWhatsApp });
        setTimeout(() => location.reload(), 1500);
      } catch(e) {
        if (e.name !== 'AbortError') console.warn("Share error:", e.message);
      }
      return;
    }
  }
  alert("Tu navegador no soporta el envío directo de archivos.\nActualiza Chrome o usa Safari en iOS.");
}

async function uploadData(nombre, anaquel, venta) {
  try {
    const path = `productos/${Date.now()}.jpg`;
    const ref  = storage.ref(path);
    await ref.put(currentBlob);
    const fotoUrl = await ref.getDownloadURL();
    await db.collection("productos").add({
      nombre,
      nombre_busqueda: nombre.toLowerCase(),
      precio_anaquel:  parseFloat(anaquel),
      precio_venta:    parseFloat(venta),
      foto:            fotoUrl,
      creado:          firebase.firestore.FieldValue.serverTimestamp()
    });
    console.log("✅ Guardado en Firebase");
  } catch(e) {
    console.error("Error Firebase:", e);
  }
}
</script>
</body>
</html>
