<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Pro — Antonio Hernandez</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
  :root { --bg: #0a0a0f; --surface: #13131c; --border: #2a2a45; --accent: #00e5c0; --text: #e8e8f0; --muted: #6b6b8a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:monospace; overflow-x: hidden; }

  /* Pantallas */
  #lens-view, #result-view, #analyzing-overlay, #key-screen, #search-modal { position: fixed; inset: 0; }

  /* ── PANTALLA API KEY ── */
  #key-screen { background: var(--bg); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; gap: 15px; }
  #key-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; color: #fff; font-family: monospace; outline: none; }

  /* ── CÁMARA ── */
  #lens-view { background: #000; display: flex; flex-direction: column; z-index: 10; }
  #camera-feed { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .ui-top { position: relative; z-index: 20; padding: 50px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); display: flex; justify-content: space-between; align-items: center; }
  .ui-bottom { position: absolute; bottom: 0; left: 0; right: 0; z-index: 20; padding: 40px 20px; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .btn-capture { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #fff; background: rgba(255,255,255,0.2); cursor: pointer; }

  /* ── RESULTADO ── */
  #result-view { background: var(--bg); z-index: 50; display: none; flex-direction: column; overflow-y: auto; }
  #result-view.show { display: flex; }
  .result-photo { width: 100%; height: 250px; object-fit: cover; border-bottom: 2px solid var(--accent); }
  .result-body { padding: 20px; }
  .input-f { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: #fff; margin-bottom: 15px; font-family: monospace; outline: none; }
  
  .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-family: monospace; width: 100%; margin-top: 10px; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-danger { background: transparent; border: 1px solid #ff4466; color: #ff4466; font-size: 0.7rem; width: auto; padding: 4px 14px; }

  /* ── ANALIZANDO ── */
  #analyzing-overlay { background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
  #analyzing-overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── BUSCADOR / INVENTARIO ── */
  #search-modal { background: var(--bg); z-index: 250; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
  .search-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .search-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1c1c2e; border: 1px solid var(--accent); padding: 12px; border-radius: 8px; display: none; z-index: 1000; font-size: 11px; max-width: 85%; text-align: center; }
</style>
</head>
<body>

<div id="key-screen" style="display:none;">
  <h2 style="color:var(--accent); font-size:1rem;">⚙ CONFIGURACIÓN</h2>
  <p style="font-size:0.75rem; text-align:center; color:var(--muted);">Ingresa tu API Key de Gemini para el escáner.</p>
  <input id="key-input" type="password" placeholder="AIzaSy...">
  <button class="btn btn-primary" onclick="saveKey()">GUARDAR Y EMPEZAR</button>
</div>

<div id="lens-view">
  <video id="camera-feed" autoplay playsinline muted></video>
  <div class="ui-top">
    <div style="font-weight: bold; color: var(--accent);">SCANNER PRO v4.0</div>
    <button class="btn-outline" onclick="openSearch()" style="width:auto; padding:5px 12px;">🔍 INVENTARIO</button>
  </div>
  <div class="ui-bottom">
    <button class="btn-capture" onclick="captureAndAnalyze()"></button>
    <button class="btn-danger" onclick="resetKey()">CAMBIAR API KEY</button>
  </div>
</div>

<div id="result-view">
  <img id="result-photo" class="result-photo">
  <div class="result-body">
    <label style="font-size: 10px; color: var(--muted);">IDENTIFICACIÓN PRODUCTO</label>
    <textarea id="field-desc" class="input-f" rows="3"></textarea>
    <div style="display: flex; gap: 10px;">
      <div style="flex: 1;"><label style="font-size:10px; color:var(--muted);">ANAQUEL $</label><input type="number" id="field-costo" class="input-f"></div>
      <div style="flex: 1;"><label style="font-size:10px; color:var(--muted);">VENTA $</label><input type="number" id="field-venta" class="input-f"></div>
    </div>
    <button class="btn btn-primary" id="btn-save" onclick="saveData()">GUARDAR EN FIREBASE</button>
    <button class="btn btn-outline" onclick="closeResult()">CANCELAR</button>
  </div>
</div>

<div id="search-modal">
  <h2 style="color:var(--accent); margin-bottom:15px;">📦 INVENTARIO</h2>
  <input type="text" id="search-input" class="input-f" placeholder="Buscar por nombre..." oninput="runSearch()">
  <div id="search-results"></div>
  <button class="btn btn-outline" onclick="closeSearch()">CERRAR</button>
</div>

<div id="analyzing-overlay">
  <div class="spinner"></div>
  <p style="margin-top: 15px; color: var(--accent);">GEMINI ANALIZANDO...</p>
</div>

<div id="toast" class="toast"></div>

<script>
// 1. CONFIGURACIÓN FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyB3kiLskvkV6cJ0byaCg_zqe-GIWM3jelI",
  authDomain: "ofertas-rapidas-con-scanner.firebaseapp.com",
  projectId: "ofertas-rapidas-con-scanner",
  storageBucket: "ofertas-rapidas-con-scanner.firebasestorage.app",
  messagingSenderId: "1093159890306",
  appId: "1:1093159890306:web:67211603ff99753207f39b"
};

firebase.initializeApp(firebaseConfig);
const db      = firebase.firestore();
const storage = firebase.storage();
let currentBlob = null;

// 2. INICIO Y LLAVES
window.onload = () => {
  const key = localStorage.getItem('gemini_key');
  if (!key || key.length < 10) {
    document.getElementById('key-screen').style.display = 'flex';
    document.getElementById('lens-view').style.display  = 'none';
  } else {
    startCamera();
  }
};

function saveKey() {
  const k = document.getElementById('key-input').value.trim();
  if (k.length > 10) {
    localStorage.setItem('gemini_key', k);
    location.reload();
  }
}

function resetKey() {
  localStorage.removeItem('gemini_key');
  location.reload();
}

// 3. CÁMARA
async function startCamera() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280 } });
    document.getElementById('camera-feed').srcObject = s;
  } catch (e) { showToast("Error de cámara"); }
}

// 4. CAPTURA E IA
async function captureAndAnalyze() {
  const v = document.getElementById('camera-feed');
  const canvas = document.createElement('canvas');
  canvas.width = v.videoWidth; canvas.height = v.videoHeight;
  canvas.getContext('2d').drawImage(v, 0, 0);

  canvas.toBlob(async (blob) => {
    currentBlob = blob;
    document.getElementById('result-photo').src = URL.createObjectURL(blob);
    const reader = new FileReader();
    reader.onloadend = () => callIA(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  }, 'image/jpeg', 0.85);
}

async function callIA(base64) {
  document.getElementById('analyzing-overlay').classList.add('show');
  const key = localStorage.getItem('gemini_key');
  // URL v1beta con modelo flash-lite (el que te funcionó)
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`;

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [
          { inline_data: { mime_type: 'image/jpeg', data: base64 } },
          { text: "Identifica marca y producto. Responde solo el nombre en MAYÚSCULAS." }
        ]}]
      })
    });

    const data = await res.json();
    const texto = data.candidates[0].content.parts[0].text;
    document.getElementById('field-desc').value = texto.trim().toUpperCase();
    document.getElementById('analyzing-overlay').classList.remove('show');
    document.getElementById('result-view').classList.add('show');
  } catch (e) {
    document.getElementById('analyzing-overlay').classList.remove('show');
    showToast("Error de lectura IA");
  }
}

// 5. FIREBASE GUARDADO
async function saveData() {
  const btn = document.getElementById('btn-save');
  const nombre = document.getElementById('field-desc').value.trim();
  if(!nombre) return;

  btn.disabled = true; btn.innerText = "GUARDANDO...";
  try {
    const path = `productos/${Date.now()}.jpg`;
    const ref = storage.ref(path);
    await ref.put(currentBlob);
    const url = await ref.getDownloadURL();

    await db.collection("productos").add({
      nombre,
      nombre_busqueda: nombre.toLowerCase(),
      precio_anaquel: parseFloat(document.getElementById('field-costo').value) || 0,
      precio_venta: parseFloat(document.getElementById('field-venta').value) || 0,
      foto: url,
      creado: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast("✅ ¡GUARDADO!");
    closeResult();
  } catch (e) { showToast("Error al guardar"); }
  btn.disabled = false; btn.innerText = "GUARDAR EN FIREBASE";
}

// 6. BUSCADOR
function openSearch() {
  document.getElementById('search-modal').style.display = 'flex';
  runSearch();
}

function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }

async function runSearch() {
  const term = document.getElementById('search-input').value.toLowerCase();
  const resContainer = document.getElementById('search-results');
  resContainer.innerHTML = "";

  let query = db.collection("productos").orderBy("creado", "desc").limit(20);
  if (term) {
    query = db.collection("productos").orderBy("nombre_busqueda").startAt(term).endAt(term + '\uf8ff');
  }

  const snap = await query.get();
  snap.forEach(doc => {
    const p = doc.data();
    resContainer.innerHTML += `
      <div class="search-card">
        <img src="${p.foto}">
        <div style="flex:1">
          <div style="font-size:11px; font-weight:bold;">${p.nombre}</div>
          <div style="color:var(--accent); font-size:10px;">Venta: $${p.precio_venta} | Anaquel: $${p.precio_anaquel}</div>
        </div>
        <button onclick="compartir('${p.nombre}', ${p.precio_venta}, '${p.foto}')" style="background:none; border:none; font-size:18px;">📲</button>
      </div>`;
  });
}

function compartir(n, v, f) {
  const msg = `*OFERTA RÁPIDA*%0A*Producto:* ${n}%0A*Precio:* $${v}%0A*Foto:* ${f}`;
  window.open(`https://wa.me/?text=${msg}`, '_blank');
}

function showToast(m) {
  const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

function closeResult() { document.getElementById('result-view').classList.remove('show'); }
</script>
</body>
</html>
